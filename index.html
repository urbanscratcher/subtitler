<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Video Notes</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
    * { box-sizing: border-box; }
    :root {
      color-scheme: light;
      --ink: #111111;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f7f7f5;
      --panel: #ffffff;
      --caption-fill: #000000;
      --caption-stroke: #ffffff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--soft);
      color: var(--ink);
      font-weight: 700;
      letter-spacing: 0;
    }
    main {
      width: min(720px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }
    header { margin-bottom: 22px; }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }
    .stack { display: grid; gap: 14px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .video-shell {
      position: relative;
      background: #090909;
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
    }
    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #090909;
    }
    .drop {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      background: #fbfbfa;
      color: var(--ink);
      border: 1px dashed #c9c9c3;
      transition: background 160ms ease, border-color 160ms ease;
    }
    .drop strong { display: block; font-size: 18px; }
    .drop span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .drop.dragging {
      background: #ffffff;
      border-color: #111111;
    }
    .drop.hidden { display: none; }
    .caption-preview {
      position: absolute;
      left: 5%;
      right: 5%;
      bottom: 8%;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms linear;
      color: var(--caption-fill);
      -webkit-text-stroke: clamp(2px, .35vw, 5px) var(--caption-stroke);
      paint-order: stroke fill;
      font-size: clamp(26px, 4.2vw, 58px);
      line-height: 1.12;
      font-weight: 700;
      overflow-wrap: anywhere;
    }
    .caption-preview.visible { opacity: 1; }
    .body { display: grid; gap: 12px; padding: 16px; }
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: 600 15px/1.6 CommitMono, ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0;
      outline: none;
      min-height: 230px;
      padding: 14px;
      resize: vertical;
    }
    textarea:focus { border-color: #111111; }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .row.between { justify-content: space-between; }
    label { color: var(--muted); font-size: 13px; }
    .file-name {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .choice {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      color: var(--ink);
      cursor: pointer;
    }
    .choice input { accent-color: #111111; }
    button {
      border: 0;
      border-radius: 6px;
      min-height: 42px;
      padding: 0 18px;
      background: #111111;
      color: #ffffff;
      font: 700 14px/1 Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary {
      background: #ffffff;
      color: #111111;
      border: 1px solid var(--line);
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .status.error { color: #b42318; }
    .status.done { color: #067647; }
    .hidden-input { display: none; }
    @media (max-width: 560px) {
      main { width: min(100vw - 20px, 720px); padding: 18px 0; }
      .body { padding: 12px; }
      textarea { min-height: 190px; }
      button { width: 100%; }
      .row { align-items: stretch; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Video Notes</h1>
      <p>Drop a video, write timestamped notes, export a shareable MP4.</p>
    </header>

    <div class="stack">
      <section class="panel">
        <div class="video-shell" id="dropZone">
          <video id="player" controls></video>
          <div class="caption-preview" id="captionPreview"></div>
          <div class="drop" id="drop">
            <div>
              <strong>Drop MP4 or MOV</strong>
              <span>or click to choose a video</span>
            </div>
          </div>
        </div>
        <div class="body">
          <div class="row">
            <button class="secondary" id="pick">Choose Video</button>
            <span class="file-name" id="fileName">No video selected</span>
            <input class="hidden-input" id="fileInput" type="file" accept="video/mp4,video/quicktime,.mp4,.mov,.m4v" />
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="body">
          <label>Notes</label>
          <textarea id="source" spellcheck="false">3.2 Button doesn't work.
4 Please change this.
6 2 Looks strange.</textarea>
        </div>
      </section>

      <section class="panel">
        <div class="body">
          <div class="row between">
            <div class="row" role="radiogroup" aria-label="Default duration">
              <label class="choice"><input type="radio" name="defaultMode" value="1" checked /> 1 second</label>
              <label class="choice"><input type="radio" name="defaultMode" value="next" /> Until next note</label>
            </div>
            <div class="row" role="radiogroup" aria-label="Caption style">
              <label class="choice"><input type="radio" name="captionStyle" value="black" checked /> Black / White</label>
              <label class="choice"><input type="radio" name="captionStyle" value="white" /> White / Black</label>
            </div>
            <button id="render">Export</button>
          </div>
          <div class="status" id="status"></div>
        </div>
      </section>
    </div>
  </main>

  <script type="module">
    import { FFmpeg } from "/node_modules/@ffmpeg/ffmpeg/dist/esm/index.js";
    import { fetchFile } from "/node_modules/@ffmpeg/util/dist/esm/index.js";

    const $ = selector => document.querySelector(selector);
    const $$ = selector => [...document.querySelectorAll(selector)];
    const els = {
      player: $("#player"),
      dropZone: $("#dropZone"),
      drop: $("#drop"),
      captionPreview: $("#captionPreview"),
      pick: $("#pick"),
      fileInput: $("#fileInput"),
      fileName: $("#fileName"),
      source: $("#source"),
      render: $("#render"),
      status: $("#status")
    };

    const ffmpeg = new FFmpeg();
    let ffmpegLoaded = false;
    let videoFile = null;
    let videoUrl = "";
    let annotations = [];
    const fallbackDuration = 1;

    function setStatus(message, tone = "") {
      els.status.textContent = message;
      els.status.className = `status ${tone}`.trim();
    }

    function selectedDefault() {
      return document.querySelector("input[name='defaultMode']:checked").value;
    }

    function selectedCaptionStyle() {
      return document.querySelector("input[name='captionStyle']:checked").value === "white"
        ? { fill: "#ffffff", stroke: "#000000" }
        : { fill: "#000000", stroke: "#ffffff" };
    }

    function updateCaptionStyle() {
      const style = selectedCaptionStyle();
      document.documentElement.style.setProperty("--caption-fill", style.fill);
      document.documentElement.style.setProperty("--caption-stroke", style.stroke);
    }

    function parseTime(value) {
      const clean = value.trim();
      const clock = clean.match(/^(?:(\d{1,2}):)?(\d{1,2})(?:\.(\d{1,3}))?$/);
      if (!clock) throw new Error(`Invalid time: ${value}`);
      const minutes = Number(clock[1] || 0);
      const seconds = Number(clock[2]);
      const millis = Number((clock[3] || "0").padEnd(3, "0"));
      if (seconds >= 60 && clock[1]) throw new Error(`Invalid seconds: ${value}`);
      return minutes * 60 + seconds + millis / 1000;
    }

    function parseNotes() {
      let defaultRule = selectedDefault();
      const parsed = [];

      els.source.value.split(/\r?\n/).forEach((line, index) => {
        const text = line.trim();
        if (!text) return;

        const defaultMatch = text.match(/^default\s*:\s*(next|\d+(?:\.\d+)?)$/i);
        if (defaultMatch) {
          defaultRule = defaultMatch[1].toLowerCase();
          return;
        }

        const match = text.match(/^(\S+)(?:\s+(\d+(?:\.\d+)?))?\s+(.+)$/);
        if (!match) throw new Error(`Line ${index + 1}: use "time text"`);

        parsed.push({
          start: parseTime(match[1]),
          explicitDuration: match[2] ? Number(match[2]) : null,
          defaultRule,
          text: match[3].trim(),
          line: index + 1
        });
      });

      parsed.sort((a, b) => a.start - b.start);
      return parsed.map((entry, index) => {
        const next = parsed[index + 1];
        let duration = entry.explicitDuration;
        if (duration == null) {
          duration = entry.defaultRule === "next"
            ? (next ? Math.max(.1, next.start - entry.start) : fallbackDuration)
            : Number(entry.defaultRule);
        }
        if (!Number.isFinite(duration) || duration <= 0) throw new Error(`Line ${entry.line}: duration must be greater than 0`);
        return { start: entry.start, duration, end: entry.start + duration, text: entry.text };
      });
    }

    function rebuild() {
      try {
        annotations = parseNotes();
        const ready = Boolean(videoFile && annotations.length);
        els.render.disabled = !ready;
        setStatus(ready ? `${annotations.length} notes ready` : "Choose a video to export");
        updatePreview();
      } catch (error) {
        annotations = [];
        els.render.disabled = true;
        setStatus(error.message, "error");
        updatePreview();
      }
    }

    function updatePreview() {
      const now = els.player.currentTime || 0;
      const active = annotations.find(item => now >= item.start && now <= item.end);
      els.captionPreview.textContent = active ? active.text : "";
      els.captionPreview.classList.toggle("visible", Boolean(active));
    }

    function loadVideo(file) {
      if (!file || !/\.(mp4|mov|m4v)$/i.test(file.name)) {
        throw new Error("Use an MP4 or MOV file");
      }
      videoFile = file;
      if (videoUrl) URL.revokeObjectURL(videoUrl);
      videoUrl = URL.createObjectURL(file);
      els.player.src = videoUrl;
      els.player.load();
      els.fileName.textContent = file.name;
      els.drop.classList.add("hidden");
      rebuild();
    }

    function wrapText(ctx, text, maxWidth) {
      const lines = [];
      for (const rawLine of text.split(/\r?\n/) || [""]) {
        let current = "";
        for (const char of rawLine) {
          const candidate = current + char;
          if (ctx.measureText(candidate).width <= maxWidth) {
            current = candidate;
          } else {
            if (current) lines.push(current);
            current = char;
          }
        }
        if (current) lines.push(current);
      }
      return lines.length ? lines : [text];
    }

    function canvasBlob(canvas) {
      return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
    }

    async function makeCaptionPng(entry, width) {
      const style = selectedCaptionStyle();
      const fontSize = Math.max(26, Math.round(width * 0.034));
      const lineHeight = Math.round(fontSize * 1.35);
      const padX = Math.round(width * 0.04);
      const maxTextWidth = width - padX * 2;
      const probe = document.createElement("canvas");
      const probeCtx = probe.getContext("2d");
      probeCtx.font = `700 ${fontSize}px Pretendard, sans-serif`;
      const lines = wrapText(probeCtx, entry.text, maxTextWidth);
      const height = Math.max(Math.round(width * 0.11), lineHeight * lines.length + 24);

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.font = `700 ${fontSize}px Pretendard, sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.lineJoin = "round";
      ctx.lineWidth = Math.max(4, Math.round(width * 0.006));
      ctx.strokeStyle = style.stroke;
      ctx.fillStyle = style.fill;

      let y = Math.round((height - lineHeight * lines.length) / 2);
      for (const line of lines) {
        ctx.strokeText(line, width / 2, y);
        ctx.fillText(line, width / 2, y);
        y += lineHeight;
      }

      return new Uint8Array(await (await canvasBlob(canvas)).arrayBuffer());
    }

    async function ensureFfmpeg() {
      if (ffmpegLoaded) return;
      setStatus("Loading ffmpeg.wasm...");
      ffmpeg.on("progress", ({ progress }) => {
        if (Number.isFinite(progress)) setStatus(`Exporting... ${Math.round(progress * 100)}%`);
      });
      ffmpeg.on("log", ({ message }) => {
        console.debug(message);
      });
      const coreBaseURL = `${location.origin}/node_modules/@ffmpeg/core/dist/esm`;
      await ffmpeg.load({
        classWorkerURL: `${location.origin}/node_modules/@ffmpeg/ffmpeg/dist/esm/worker.js`,
        coreURL: `${coreBaseURL}/ffmpeg-core.js`,
        wasmURL: `${coreBaseURL}/ffmpeg-core.wasm`
      });
      ffmpegLoaded = true;
    }

    function inputName(file) {
      const ext = file.name.toLowerCase().endsWith(".mov") ? "mov" : "mp4";
      return `input.${ext}`;
    }

    async function exportVideo() {
      if (!videoFile) return;
      annotations = parseNotes();
      if (!annotations.length) throw new Error("Add at least one note");
      if (!els.player.videoWidth) throw new Error("Video metadata is not ready yet");

      await document.fonts.ready;
      await ensureFfmpeg();

      const inName = inputName(videoFile);
      const outName = "video-annotated.mp4";
      await ffmpeg.writeFile(inName, await fetchFile(videoFile));

      const args = ["-y", "-i", inName];
      for (let index = 0; index < annotations.length; index += 1) {
        const name = `caption-${index}.png`;
        await ffmpeg.writeFile(name, await makeCaptionPng(annotations[index], els.player.videoWidth));
        args.push("-loop", "1", "-i", name);
      }

      let input = "[0:v]";
      const filters = annotations.map((entry, index) => {
        const caption = `[cap${index}]`;
        const output = index === annotations.length - 1 ? "[vout]" : `[v${index + 1}]`;
        const fadeOutStart = Math.max(entry.start, entry.end - 0.12);
        const enable = `between(t\\,${entry.start}\\,${entry.end})`;
        const filter = [
          `[${index + 1}:v]format=rgba,fade=t=in:st=${entry.start}:d=0.12:alpha=1,fade=t=out:st=${fadeOutStart}:d=0.12:alpha=1${caption}`,
          `${input}${caption}overlay=x=0:y=H-h-32:shortest=1:enable='${enable}'${output}`
        ].join(";");
        input = output;
        return filter;
      }).join(";");

      const exitCode = await ffmpeg.exec([
        ...args,
        "-filter_complex", filters,
        "-map", "[vout]",
        "-map", "0:a?",
        "-c:v", "libx264",
        "-preset", "ultrafast",
        "-pix_fmt", "yuv420p",
        "-c:a", "aac",
        "-b:a", "128k",
        "-shortest",
        "-movflags", "+faststart",
        outName
      ]);
      if (exitCode !== 0) throw new Error(`ffmpeg exited with code ${exitCode}`);

      const data = await ffmpeg.readFile(outName);
      const url = URL.createObjectURL(new Blob([data.buffer], { type: "video/mp4" }));
      const link = document.createElement("a");
      link.href = url;
      link.download = outName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 30_000);
    }

    els.drop.addEventListener("click", () => els.fileInput.click());
    els.pick.addEventListener("click", () => els.fileInput.click());
    els.fileInput.addEventListener("change", () => {
      try {
        loadVideo(els.fileInput.files[0]);
      } catch (error) {
        setStatus(error.message, "error");
      }
    });
    els.dropZone.addEventListener("dragover", event => {
      event.preventDefault();
      els.drop.classList.add("dragging");
    });
    els.dropZone.addEventListener("dragleave", () => els.drop.classList.remove("dragging"));
    els.dropZone.addEventListener("drop", event => {
      event.preventDefault();
      els.drop.classList.remove("dragging");
      try {
        loadVideo(event.dataTransfer.files[0]);
      } catch (error) {
        setStatus(error.message, "error");
      }
    });
    els.source.addEventListener("input", rebuild);
    $$("input[name='defaultMode']").forEach(input => input.addEventListener("change", rebuild));
    $$("input[name='captionStyle']").forEach(input => input.addEventListener("change", updateCaptionStyle));
    els.player.addEventListener("timeupdate", updatePreview);
    els.player.addEventListener("seeked", updatePreview);
    els.player.addEventListener("loadedmetadata", rebuild);
    els.render.addEventListener("click", async () => {
      try {
        els.render.disabled = true;
        setStatus("Preparing export...");
        await exportVideo();
        setStatus("Downloaded video-annotated.mp4", "done");
      } catch (error) {
        console.error(error);
        setStatus(error && error.message ? error.message : String(error), "error");
      } finally {
        els.render.disabled = false;
      }
    });

    updateCaptionStyle();
    rebuild();
  </script>
</body>
</html>
