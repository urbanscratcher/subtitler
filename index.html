<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>영상 자막 합치기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fa;
      color: #1f2937;
    }
    main { width: min(1280px, calc(100vw - 32px)); margin: 0 auto; padding: 28px 0; }
    header, .row, .layout { display: flex; gap: 12px; }
    header { align-items: end; justify-content: space-between; margin-bottom: 16px; }
    h1 { margin: 0 0 6px; font-size: 26px; letter-spacing: 0; }
    p { margin: 0; color: #667085; line-height: 1.5; }
    button {
      border: 0;
      border-radius: 6px;
      background: #1769aa;
      color: white;
      min-height: 38px;
      padding: 0 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    button.secondary { background: #475467; }
    button.danger { background: #b42318; }
    button:hover { filter: brightness(.92); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .layout { align-items: start; }
    .left { flex: 1.15 1 0; min-width: 0; }
    .right { flex: .85 1 420px; min-width: 360px; }
    section {
      background: white;
      border: 1px solid #d7dce3;
      border-radius: 8px;
      box-shadow: 0 12px 36px rgba(16, 24, 40, .08);
      overflow: hidden;
    }
    section + section { margin-top: 12px; }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 15px;
      border-bottom: 1px solid #d7dce3;
    }
    h2 { margin: 0; font-size: 15px; letter-spacing: 0; }
    .body { display: grid; gap: 12px; padding: 15px; }
    label { display: grid; gap: 6px; font-size: 13px; font-weight: 700; color: #344054; }
    input, textarea, pre {
      width: 100%;
      border: 1px solid #d7dce3;
      border-radius: 6px;
      background: #fbfcfe;
      color: #1f2937;
      font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    input { min-height: 38px; padding: 8px 10px; }
    textarea { min-height: 280px; padding: 12px; resize: vertical; }
    pre { min-height: 142px; margin: 0; padding: 12px; overflow: auto; white-space: pre-wrap; word-break: break-word; }
    video { display: block; width: 100%; max-height: 58vh; background: #101828; }
    .status { min-height: 20px; font-size: 13px; color: #667085; }
    .status.error { color: #b42318; }
    .grow { flex: 1; }
    .compact { max-width: 120px; }
    @media (max-width: 900px) {
      header, .layout { display: block; }
      header .row { margin-top: 12px; flex-wrap: wrap; }
      .right { min-width: 0; margin-top: 12px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>영상 자막 합치기</h1>
        <p>영상을 고르고 플레이어의 현재 시간으로 자막 줄을 추가한 뒤, ffmpeg으로 영상 옆에 결과 파일을 만듭니다.</p>
      </div>
      <div class="row">
        <button id="render">ffmpeg 합치기</button>
        <button class="secondary" id="downloadSrt">SRT 저장</button>
      </div>
    </header>

    <div class="layout">
      <div class="left">
        <section>
          <div class="head">
            <h2>영상</h2>
            <span class="status" id="status"></span>
          </div>
          <video id="player" controls></video>
          <div class="body">
            <div class="row">
              <button id="pick">영상 선택</button>
              <label class="grow">영상 경로
                <input id="videoPath" placeholder="/Users/me/Desktop/input.mp4" />
              </label>
            </div>
            <div class="row">
              <label class="compact">기본 지속초
                <input id="duration" type="number" min="0.5" step="0.5" value="3" />
              </label>
              <label class="grow">자막 문구
                <input id="captionText" placeholder="여기에 자막을 쓰고 Enter" />
              </label>
              <button id="insert">＋ 현재 시간</button>
            </div>
          </div>
        </section>
      </div>

      <div class="right">
        <section>
          <div class="head"><h2>자막 입력</h2></div>
          <div class="body">
            <textarea id="source" spellcheck="false" placeholder="00:01.5 | 3 | 로그인 버튼 클릭"></textarea>
          </div>
        </section>

        <section>
          <div class="head"><h2>출력</h2></div>
          <div class="body">
            <label>결과 파일명
              <input id="outputName" value="captioned.mp4" />
            </label>
            <label>SRT 미리보기
              <pre id="srt"></pre>
            </label>
            <label>ffmpeg 로그
              <pre id="log"></pre>
            </label>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const $ = selector => document.querySelector(selector);
    const els = {
      player: $("#player"), pick: $("#pick"), videoPath: $("#videoPath"), duration: $("#duration"),
      captionText: $("#captionText"), insert: $("#insert"), source: $("#source"), outputName: $("#outputName"),
      srt: $("#srt"), log: $("#log"), status: $("#status"), render: $("#render"), downloadSrt: $("#downloadSrt")
    };

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", isError);
    }

    function formatInputTime(seconds) {
      const total = Math.max(0, Math.round(seconds * 10) / 10);
      const m = Math.floor(total / 60);
      const s = (total % 60).toFixed(1).padStart(4, "0");
      return `${String(m).padStart(2, "0")}:${s}`;
    }

    function parseTime(value) {
      const match = value.trim().match(/^(?:(\d{1,2}):)?(\d{1,2})(?:\.(\d{1,3}))?$/);
      if (!match) throw new Error(`시간 형식 오류: ${value}`);
      const minutes = Number(match[1] || 0);
      const seconds = Number(match[2]);
      const millis = Number((match[3] || "0").padEnd(3, "0"));
      if (seconds >= 60) throw new Error(`초는 60보다 작아야 합니다: ${value}`);
      return (minutes * 60 + seconds) * 1000 + millis;
    }

    function formatSrtTime(ms) {
      const total = Math.max(0, Math.round(ms));
      const h = Math.floor(total / 3600000);
      const m = Math.floor((total % 3600000) / 60000);
      const s = Math.floor((total % 60000) / 1000);
      const z = total % 1000;
      return [h, m, s].map(n => String(n).padStart(2, "0")).join(":") + "," + String(z).padStart(3, "0");
    }

    function buildSrt() {
      const lines = els.source.value.split(/\r?\n/).filter(line => line.trim());
      const entries = lines.map((line, index) => {
        const parts = line.split("|").map(part => part.trim());
        if (parts.length < 3) throw new Error(`${index + 1}번째 줄은 "시간 | 초 | 문구" 형식이어야 합니다.`);
        const duration = Number(parts[1]);
        if (!Number.isFinite(duration) || duration <= 0) throw new Error(`${index + 1}번째 줄의 지속 시간은 0보다 커야 합니다.`);
        const start = parseTime(parts[0]);
        return { start, end: start + duration * 1000, text: parts.slice(2).join(" | ") };
      });

      return entries.map((entry, index) => {
        const next = entries[index + 1];
        const end = next && next.start > entry.start ? Math.min(entry.end, next.start) : entry.end;
        return [index + 1, `${formatSrtTime(entry.start)} --> ${formatSrtTime(end)}`, entry.text].join("\n");
      }).join("\n\n");
    }

    function rebuild() {
      try {
        els.srt.textContent = buildSrt();
        setStatus(els.srt.textContent ? "자막 준비됨" : "자막을 추가하세요");
        els.render.disabled = !els.srt.textContent || !els.videoPath.value.trim();
        els.downloadSrt.disabled = !els.srt.textContent;
      } catch (error) {
        els.srt.textContent = "";
        setStatus(error.message, true);
        els.render.disabled = els.downloadSrt.disabled = true;
      }
    }

    function loadVideo(path) {
      els.player.src = `/video?path=${encodeURIComponent(path)}&t=${Date.now()}`;
      els.player.load();
      rebuild();
    }

    function insertCaption() {
      const text = els.captionText.value.trim();
      const duration = Number(els.duration.value) || 3;
      const line = `${formatInputTime(els.player.currentTime)} | ${duration} | ${text}`;
      const prefix = els.source.value.trimEnd();
      els.source.value = prefix ? `${prefix}\n${line}` : line;
      els.captionText.value = "";
      els.captionText.focus();
      rebuild();
    }

    els.pick.addEventListener("click", async () => {
      try {
        setStatus("영상 선택 중...");
        const res = await fetch("/pick-video", { method: "POST" });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "영상 선택 실패");
        els.videoPath.value = data.path;
        loadVideo(data.path);
      } catch (error) {
        setStatus(error.message, true);
      }
    });

    els.videoPath.addEventListener("change", () => els.videoPath.value.trim() && loadVideo(els.videoPath.value.trim()));
    els.insert.addEventListener("click", insertCaption);
    els.captionText.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        insertCaption();
      }
    });
    els.source.addEventListener("input", rebuild);
    els.outputName.addEventListener("input", rebuild);

    els.downloadSrt.addEventListener("click", () => {
      const blob = new Blob([els.srt.textContent + "\n"], { type: "application/x-subrip;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "subtitle.srt";
      link.click();
      URL.revokeObjectURL(link.href);
    });

    els.render.addEventListener("click", async () => {
      try {
        els.render.disabled = true;
        els.log.textContent = "ffmpeg 실행 중...";
        const res = await fetch("/render", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            videoPath: els.videoPath.value.trim(),
            outputName: els.outputName.value.trim(),
            srt: els.srt.textContent
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "ffmpeg 실패");
        els.log.textContent = `완료: ${data.outputPath}\n\n${data.log || ""}`;
        setStatus("영상 생성 완료");
      } catch (error) {
        els.log.textContent = error.message;
        setStatus(error.message, true);
      } finally {
        rebuild();
      }
    });

    rebuild();
  </script>
</body>
</html>
